entries:
  - name: "TASS"
    blurb: "Multi-instrument sentiment ensemble (AFINN + TASS + RoBERTa) for communication research at corpus scale."
    href: "https://github.com/AURA-Lab-SIUE/tass"
    language: "Python"
  - name: "v2v"
    blurb: "R package for the Vibes to Variables open textbook — load and analyze a 22M-row Twitch corpus from a learner-friendly API."
    href: "https://github.com/AURA-Lab-SIUE/v2v"
    language: "R"
  - name: "GearOut"
    blurb: "Equipment-reservation platform deployed at SIUE as MassComm Checkout."
    href: "https://github.com/AURA-Lab-SIUE/equipment-checkout"
    language: "TypeScript"
  - name: "Open WebUI Launcher"
    blurb: "Local-first launcher for running Open WebUI against on-prem LLM endpoints. Built for the RHML sabbatical thread."
    href: "https://github.com/AURA-Lab-SIUE/open-webui-launcher"
    language: "TypeScript"
  - name: "coursepackR"
    blurb: "R package collecting datasets and helpers used across Mass Communications courses at SIUE."
    href: "https://github.com/AURA-Lab-SIUE/coursepackR"
    language: "R"
  - name: "Mass Comm Careers Dashboard"
    blurb: "Interactive dashboard mapping career outcomes and pathways for Mass Communications graduates."
    href: "https://github.com/AURA-Lab-SIUE/mc-careers-dashboard"
    language: "SvelteKit"
  - name: "Banned Word Checker"
    blurb: "Python tool for testing Word documents or PDF submissions against a list of prohibited terms."
    href: "https://github.com/AURA-Lab-SIUE/banned-word-checker"
    language: "Python"
  - name: "Hate Raids"
    blurb: "R-based data and analysis behind the peer-reviewed Hate Raids paper — coordinated harassment events on Twitch."
    href: "https://github.com/AURA-Lab-SIUE/hate-raids"
    language: "R"
